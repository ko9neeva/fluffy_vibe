<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О Flyffy Vibe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- .container: Имеет фиксированную ширину, которая меняется скачками в зависимости от размера экрана (на очень больших мониторах он центрируется и оставляет пустые поля по бокам). Это делает текст более читабельным, так как он не растягивается на всю ширину сверхширокого монитора. -->
    <!-- px-0 = padding-x: 0 (для видео)-->
    <div class="container-fluid px-0">
        <!-- 1.Навигационная панель -->
        <nav class="navbar navbar-expand-md px-3">
            <!--занимаем 3 столбца, чтобы лого было в центре -->
            <div class="flex-grow-1 col-3"></div>
            <!-- mb-3: Устанавливает отступ снизу размером 3
            mb-md-0: Правило: «начиная с размера экрана md (768px и больше) и выше, обнули отступ снизу» -->
            <div class="logo-with-text d-flex flex-column align-items-center mb-2 col-6">
                <img src="pictures/fluffy_vibe_logo.png" class="main-logo" alt="Логотип">
                <span class="main-text mt-1 fw-light ">FLUFFY VIBE</span>
            </div>  
            <!-- Меню справа -->
            <div class="flex-grow-1 d-flex justify-content-end col-3">
                <div class="dropdown">
                    <button class="btn btn-outline-dark dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        Меню
                    </button>
                    <!-- dropdown-menu-end выравнивает выпадающий список по правому краю кнопки -->
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="page-2.html">Как мы создаем</a></li>
                        <li><a class="dropdown-item" href="catalog.html">Каталог</a></li>
                        <li><a class="dropdown-item" href="#">Корзина</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 2.Видео -->
        <div class="d-md-flex flex-md-equal w-100" > 
            
            <div class="text-bg-dark me-md-0 pt-0 px-0 pt-md-1 px-md-5 text-center text-md-end overflow-hidden"> 
                <div class="my-3 py-3"> 
                    <h2 class="display-7 px-3"> <hr> Дословно FLUFFY VIBE - это пушистая атмосфера. Мы производим  одежду для вас и ваших хвостиков<hr> </h2> 
                </div> 

                <div class="my-0 py-0"> 
                    <video autoplay muted loop playsinline style="border-radius: 21px 21px 0 0;" poster="" class="start-0 w-100 h-100 object-fit-cover d-block"> 
                        <source src="videos/Instagram-2.mp4" type="video/mp4"> 
                    </video>
                </div>
            </div> 
            
            <div class="bg-body-tertiary me-md-0 pt-0 px-0 pt-md-1 px-md-5 text-center text-md-start overflow-hidden">
                <div class="my-3 py-3"> 
                    <h2 class="display-7 px-3"> <hr> Бренд создавался для того, чтобы сблизить вас с вашими четвероногими друзьями и сделать вашу рутину более яркой и разнообразной <hr></h2> 
                </div> 

                <div class="my-0 py-0"> 
                    <video autoplay muted loop playsinline  style="border-radius: 21px 21px 0 0;" poster="" class="start-0 w-100 h-100 object-fit-cover d-block">   
                        <source src="videos/Instagram-1.mp4" type="video/mp4" > 
                    </video>
                </div>
            </div> 

        </div>

        <!-- 3.Панель с соцсетями -->
        <footer class="page-end py-1 my-0 "> 
            <ul class="nav justify-content-center"> 
                <li class="ms-3">
                    <a class="text-body-secondary" href="https://www.instagram.com/fluffy.vibe/" target="_blank" aria-label="Instagram">
                        <i class="bi bi-instagram"></i> 
                    </a>
                </li> 
                <li class="ms-3">
                    <a class="text-body-secondary" href="https://t.me/fluffy_vibe_store" target="_blank" aria-label="Telegram">
                        <i class="bi bi-telegram"></i>
                    </a>
                </li> 
            </ul> 
            <!-- <div class="col-12 d-flex justify-content-center"> 
                <span class="mb-3 mb-md-0 text-body-secondary">© 2026</span> 
            </div>  -->
        </footer> 
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
