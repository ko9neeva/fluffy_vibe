<!DOCTYPE html>
<html lang="ru">

<body>
    <!-- .container: Имеет фиксированную ширину, которая меняется скачками в зависимости от размера экрана (на очень больших мониторах он центрируется и оставляет пустые поля по бокам). Это делает текст более читабельным, так как он не растягивается на всю ширину сверхширокого монитора. -->
    <!-- px-0 = padding-x: 0 (для видео)-->
    <div class="container-fluid px-0">

        <nav class="navbar navbar-expand-md px-3">

            <div class="flex-grow-1 col-3"></div>
            <!-- mb-3: Устанавливает отступ снизу размером 3

            <div class="logo-with-text d-flex flex-column align-items-center mb-2 col-6">

                        <li><a class="dropdown-item" href="#">Корзина</a></li>

            </div>
        </nav>
