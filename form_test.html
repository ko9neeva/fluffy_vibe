            </div>
            <div class="col-10 col-sm-3">
                <input type="text" id="size_9" name="back2">
            </div>
            <div class="col-sm-1"> </div>

            <div class="col-1"> </div>
            <div class="col-10">
                <label for="descID">Дополнительная информация: </label>
            </div>
            <div class="col-1"> </div>
            <div class="col-10">
                <textarea id="descID" cols="30" rows="10" name="description" placeholder="i am waiting for..."></textarea>
            </div>
            
        </div>

                <fieldset>
                    <legend>Ask me anything</legend>
                    <label for="size_1">1. Обхват шеи (по ошейнику): </label>

                    <label for="size_6">6. Обхват передней лапки (на конце рукава): </label>

                    <br><br>
                    <label for="size_9">9. Ширина спинки (от основания лапки через спинку, до основания второй лапки): </label>
                    <input type="text" id="size_9" name="back2">
                    <br><br>


                    <label for="descID">Дополнительная информация: </label>
                    <br>
                    <textarea id="descID" cols="30" rows="10" name="description" placeholder="i am waiting for..."></textarea>
                    <br><br>
                    <input type="submit" value="Submit form">
                </fieldset>
