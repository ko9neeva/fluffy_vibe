<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О Flyffy Vibe</title>
    <link rel="stylesheet" href="styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <!-- .container: Имеет фиксированную ширину, которая меняется скачками в зависимости от размера экрана (на очень больших мониторах он центрируется и оставляет пустые поля по бокам). Это делает текст более читабельным, так как он не растягивается на всю ширину сверхширокого монитора. -->
     <!-- px-0 = padding-x: 0 (для видео)-->
    <div class="container-fluid px-0">
        <!-- 1.Навигационная панель -->
        <nav class="navbar navbar-expand-md border-bottom border-light border-1 px-3">
            <!--занимаем 3 столбца, чтобы лого было в центре -->
            <div class="flex-grow-1 col-3"></div>
            <!-- mb-3: Устанавливает отступ снизу размером 3
            mb-md-0: Правило: «начиная с размера экрана md (768px и больше) и выше, обнули отступ снизу» -->
            <div class="main-logo d-flex flex-column align-items-center mb-2 col-6">
                <img src="pictures/fluffy_vibe_logo.png" width="100" alt="Логотип">
                <span class="fs-6 mt-1 fw-light ">FLUFFY VIBE</span>
            </div>  
            <!-- Меню справа -->
            <div class="flex-grow-1 d-flex justify-content-end col-3">
                <div class="dropdown">
                    <button class="btn btn-outline-dark dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        Меню
                    </button>
                    <!-- dropdown-menu-end выравнивает выпадающий список по правому краю кнопки -->
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="page-2.html">Как мы создаем</a></li>
                        <li><a class="dropdown-item" href="catalog.html">Каталог</a></li>
                        <li><a class="dropdown-item" href="#">Контакты</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <p class="lead mt-0 mb-0  col-12 text-center" style="color: rgba(255, 255, 255, 0.692); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); background: rgba(0, 0, 0, 0.24);"> Одежда для вас и ваших хвостиков</p>

        <!-- 2.Видео с надписью -->
        <div class="position-relative mt-0 mb-0" style="height: 100vh; ">
            <!-- Видео фон -->
            <video autoplay muted loop playsinline class="position-absolute start-0 w-100 h-100 object-fit-cover z-0" poster="error.jpg"> 
                <source src="videos/main_video.mp4" type="video/mp4"> 
            </video> 
        
            <!-- Контент поверх (z-index выше)  -->
            <div class="mt-0 text-center position-absolute z-1" style="background: rgba(0, 0, 0, 0.24); backdrop-filter: blur(1px); ">
                <p class="lead mt-5 mb-5 col-8 mx-auto" style="color: rgba(255, 255, 255, 0.692); text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Дословно FLUFFY VIBE - это пушистая атмосфера. Бренд создавался для того, чтобы сблизить вас с вашими четвероногими друзьями, сделать вашу рутину более яркой и разнообразной</p> 
 
            </div>
        </div>

        <!-- 3.Панель с соцсетями -->
        <footer class="page-end py-1 my-0 "> 
            <ul class="nav col-12 justify-content-center"> 
                <li class="ms-3">
                    <a class="text-body-secondary" href="https://www.instagram.com/fluffy.vibe/" target="_blank" aria-label="Instagram">
                        <i class="bi bi-instagram" style="font-size: 30px;"></i> 
                    </a>
                </li> 
                <li class="ms-3">
                    <a class="text-body-secondary" href="https://t.me/fluffy_vibe_store" target="_blank" aria-label="Telegram">
                        <i class="bi bi-telegram" style="font-size: 30px;"></i>
                    </a>
                </li> 
            </ul> 
            <!-- <div class="col-12 d-flex justify-content-center"> 
                <span class="mb-3 mb-md-0 text-body-secondary">© 2026</span> 
            </div>  -->
        </footer> 
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
