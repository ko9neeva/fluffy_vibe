<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="pictures/favicon-96x96.png" sizes="96x96">
</head>

<body>
    <header class="header">
        <!-- nav — семантический тег: блок предназначен для навигации по сайту.
             navbar — базовый класс Bootstrap для navbar.-->
        <nav class="navbar" >
            <!-- занимаем 3 столбца, чтобы лого было в центре 
             g - убирает полоску справа 
             px - отступы слева и справа-->
            <div class="row w-100 g-0 px-0">
                <div class="d-none d-sm-block col-sm-3"></div>
                <div class="logo-with-text col-12 col-sm-6">
                    <img src="pictures/fluffy_vibe_logo.png" class="main-logo" alt="Логотип">
                    <h1 class="main-text mt-1 fw-light">FLUFFY VIBE</h1>                    
                </div>  
                <!-- Меню справа -->
                <div class="d-flex justify-content-center py-4 col-12 col-sm-3">
                    <div class="dropdown">
                        <button class="btn btn-outline-dark dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            Меню
                        </button>
                        <ul class="dropdown-menu dropdown-menu-center">
                            <li><a class="dropdown-item" href="index.html">Главная</a></li>
                            <li><a class="dropdown-item" href="catalog.html">Каталог</a></li>                          
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        <div class="row px-2 px-md-3 order" style="margin:20px; background-color: rgba(0, 0, 0, 0.10);">
            <div class="col-12 col-md-4 col-lg-3 orderDetails"> 
                <span id="count" ></span>
                <span id="hoodiesPrice"></span>
                <span id="stripesPrice"></span>
                <span id="totalPrice"></span>
                 <button id="btnPlaceAnOrder" type="button" class="btn btn-md btn-outline-secondary w-50">Оформить</button> 
            </div>
        </div>

        <hr class = "mt-0 mx-5">

        <div id="table_OneSize"></div>     
        <div id="table_S"></div>  
        <div id="table_M"></div>  
        <div id="table_L"></div>     
    </main>
    
    <footer class="footer"> 
        <ul>
            <li>
                <a href="https://www.instagram.com/fluffy.vibe/" target="_blank" aria-label="Instagram">
                    <i class="bi-instagram"></i> 
                </a>
            </li>
            <li>
                <a href="https://t.me/fluffy_vibe_store" target="_blank" aria-label="Telegram">
                    <i class="bi-telegram"></i>
                </a>
            </li>
        </ul>
    </footer> 
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="02-script.js"></script>
    
</body>

</html>
